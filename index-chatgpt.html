<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Children's Garden E.M. High School - Reading Assessment</title>
    <style>
        :root { --primary: #1e40af; --bg: #e0f2fe; --success: #15803d; --font-main: 'Segoe UI', Tahoma, sans-serif; }
        body { font-family: var(--font-main); background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 50%, #fef9c3 100%); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 960px; background: rgba(255, 255, 255, 0.96); padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        .school-title { font-size: 2rem; font-weight: 800; text-align: center; color: #1e3a8a; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 10px; }
        .panel { display: none; margin-top: 20px; }
        button { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-primary { background-color: #2563eb; color: white; }
        .btn-success { background-color: var(--success); color: white; }
        .sentence-box { font-size: 2.2rem; font-weight: bold; padding: 40px; background: #f1f5f9; border-radius: 20px; text-align: center; margin: 20px 0; border: 3px dashed #cbd5e1; }
        .feedback-item { border-bottom: 1px solid #ddd; padding: 10px 0; }
        .error-list { color: #b91c1c; font-weight: bold; }
        .success-list { color: #15803d; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="school-title">Children's Garden E.M. High School</div>
    
    <div id="setup-screen">
        <div class="form-group">
            <label>Student Name</label>
            <input type="text" id="student-name" placeholder="Enter student name">
        </div>
        <div class="form-group">
            <label>Class</label>
            <select id="student-class">
                <option>Nursery</option>
                <option>1st Class</option>
                <option>2nd Class</option>
            </select>
        </div>
        <div class="form-group">
            <label>Subject/Language</label>
            <select id="language">
                <option>English</option>
                <option>Telugu</option>
                <option>Hindi</option>
            </select>
        </div>
        <button class="btn-primary" onclick="startTest()">Load & Start Test</button>
    </div>

    <div id="assessment-panel" class="panel">
        <div class="sentence-box" id="target-sentence"></div>
        <button id="mic-btn" class="btn-primary" onclick="startAssessmentListening()">🎤 Start Reading</button>
        <p id="status-text" style="text-align: center; font-weight:bold; margin-top:10px;"></p>
    </div>

    <div id="feedback-panel" class="panel">
        <h2>Reading Report</h2>
        <div id="feedback-content"></div>
        <button class="btn-success" onclick="showCertificate()">Generate Certificate</button>
    </div>

    <div id="certificate-panel" class="panel" style="text-align: center;">
        <h1>🏆 Assessment Complete!</h1>
        <h2 id="cert-name"></h2>
        <button class="btn-primary" onclick="location.reload()">Test Next Student</button>
    </div>
</div>

<script>
    let currentSentences = ["the cat sits", "i like school", "apple is red"];
    let sentenceIndex = 0;
    let readingReport = [];
    let isListening = false;
    let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

    recognition.continuous = false;
    recognition.interimResults = false;

    function startTest() {
        document.getElementById("setup-screen").style.display = "none";
        document.getElementById("assessment-panel").style.display = "block";
        displaySentence();
    }

    function displaySentence() {
        document.getElementById("target-sentence").innerText = currentSentences[sentenceIndex];
        document.getElementById("status-text").innerText = "Ready to read.";
    }

    function startAssessmentListening() {
        if (!isListening) {
            try {
                recognition.start();
                isListening = true;
                document.getElementById("status-text").innerText = "Listening...";
            } catch (e) {
                console.error(e);
            }
        }
    }

    recognition.onresult = (event) => {
        isListening = false;
        const transcript = event.results[0][0].transcript.toLowerCase();
        processReadingResult(transcript);
    };

    recognition.onend = () => {
        isListening = false;
    };

    function processReadingResult(transcript) {
        const target = currentSentences[sentenceIndex].toLowerCase();
        const targetWords = target.split(" ");
        const spokenWords = transcript.toLowerCase().split(" ");
        
        let wrong = targetWords.filter(w => !spokenWords.includes(w));
        let correct = targetWords.filter(w => spokenWords.includes(w));
        let score = Math.round((correct.length / targetWords.length) * 100);

        readingReport.push({ sentence: target, spoken: transcript, score, wrong, correct });

        sentenceIndex++;
        if (sentenceIndex < currentSentences.length) {
            displaySentence();
        } else {
            finishAssessment();
        }
    }

    function finishAssessment() {
        document.getElementById("assessment-panel").style.display = "none";
        document.getElementById("feedback-panel").style.display = "block";

        let html = readingReport.map((item, index) => `
            <div class="feedback-item">
                <h3>Sentence ${index + 1}: "${item.sentence}"</h3>
                <p><b>Student Said:</b> ${item.spoken}</p>
                <p><b>Score:</b> ${item.score}%</p>
                <p class="success-list">Correct: ${item.correct.join(", ")}</p>
                <p class="error-list">Need Practice: ${item.wrong.join(", ")}</p>
            </div>
        `).join("");
        document.getElementById("feedback-content").innerHTML = html;
    }

    function showCertificate() {
        document.getElementById("feedback-panel").style.display = "none";
        document.getElementById("certificate-panel").style.display = "block";
        document.getElementById("cert-name").innerText = "Student: " + document.getElementById("student-name").value;
    }
</script>

</body>
</html>
